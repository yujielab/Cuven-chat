# ============================================
# Cuven Chat · Cloudflare Worker 配置
# ============================================
# 部署步骤：
#   1. npm install -g wrangler
#   2. wrangler login
#   3. wrangler deploy
#
# 部署后，把 opop_1.html 顶部的 CHAT_API 常量改成你的 Worker URL
# （wrangler deploy 完会在终端打印出来，类似 https://cuven-chat.xxx.workers.dev）
# 如果你想用自己的域名（例如 chat.cuven.us），到 Cloudflare Dashboard
# Workers & Pages → 该 Worker → Settings → Triggers → Custom Domains 添加。

name = "cuven-chat"
main = "worker.js"
compatibility_date = "2024-11-01"
# 开启 nodejs_compat 不是必要的（我们没用 Node API），但保留向后兼容
# compatibility_flags = ["nodejs_compat"]

# ─── Durable Object 绑定 ──────────────────────────────────────
[[durable_objects.bindings]]
name       = "CHATROOM"
class_name = "ChatRoom"

# ─── 首次部署的迁移 ──────────────────────────────────────────
# 使用 SQLite-backed Durable Objects（新版默认，免费额度更高）
[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom"]

# ─── 可选：自定义域名路由 ─────────────────────────────────────
# 解除注释并改成你自己的域名（域名要先在 Cloudflare DNS 接管）
# [[routes]]
# pattern = "chat.cuven.us/*"
# custom_domain = true

# ─── 可选：观测 ──────────────────────────────────────────────
[observability]
enabled = true
